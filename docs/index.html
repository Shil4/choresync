<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#4f46e5" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <title>ChoreSync</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="hero">
    <div class="top">
      <div class="brand"><span class="logo">🧹</span><span id="houseName">ChoreSync</span></div>
      <div class="who"><select id="meSelect" aria-label="Who are you"></select></div>
    </div>
    <div class="sub" id="heroSub">Keep the place spotless, together.</div>
    <div class="weekpill" id="weekpill"></div>
  </header>

  <main id="view"><div class="loading">Loading…</div></main>

  <canvas id="confetti"></canvas>

  <nav class="tabbar">
    <button class="tab active" data-tab="home"><span class="i">🏠</span>Home</button>
    <button class="tab" data-tab="ranks"><span class="i">🏆</span>Ranks</button>
    <button class="tab" data-tab="settings"><span class="i">⚙️</span>Settings</button>
  </nav>

  <script src="config.js"></script>
  <script type="module" src="app.js"></script>
</body>
</html>
