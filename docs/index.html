<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f766e" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <title>ChoreSync</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand"><span class="logo">🧹</span><span id="houseName">ChoreSync</span></div>
    <div class="who">
      <label for="meSelect">You:</label>
      <select id="meSelect"></select>
    </div>
  </header>

  <main id="view"><div class="loading">Loading…</div></main>

  <nav class="tabbar">
    <button data-tab="week" class="tab active">This week</button>
    <button data-tab="bins" class="tab">Bins</button>
    <button data-tab="settings" class="tab">Settings</button>
  </nav>

  <!-- config.js first (plain script), then app.js as a module -->
  <script src="config.js"></script>
  <script type="module" src="app.js"></script>
</body>
</html>
